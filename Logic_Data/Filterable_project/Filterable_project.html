<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filterable Project Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'DM Sans', sans-serif;
            padding: 3rem 2rem;
            background-color: #1a1814;
            color: #f5f0e8;
        }

        .container{
            max-width: 1100px;
            margin: 0 auto;
        }

        header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(245,240,232,0.1);
        }

        h1{
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }
        .filter__bar{
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .filter__bar .btn{
            padding: 0.45rem 1rem;
            border-radius: 999px;
            border: 1.5px solid rgba(245,240,232,0.2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            background-color: transparent;
            color: #f5f0e8;
            letter-spacing: 0.03em;
            transition: border-color 0.2s background-color 0.2s, color 0.2s;
        }

        .filter__bar .btn:hover{
            border-color: #c45c2e;
            color: #c45c2e;
        }

        .filter__bar .btn.active{
            background: #c45c2e;
            border-color: #c45c2e;
            color: #fff;
        }

        .card__container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .project__card{
            background-color: #262220;
            border: 1px solid rgba(245,240,232,0.08);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.25s, border-color 0.25s;
        }

        .project__card:hover{
            transform: translateY(-4px);
            border-color: rgba(196,92,46,0.4);
        }

        .project__card::before{
            content: '';
            display: block;
            height: 3px;
            background-color: #c45c2e;
        }

        .project__body{
            padding: 1.25rem;
        }

        .project__category{
            font-size: 0.72rem;
            color: #c45c2e;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .project__title{
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 0.6rem;
            color: #f5f0e8;
            line-height: 1.3;
        }

        .project__description{
            font-size: 0.9rem;
            color: rgba(245,240,232,0.6);
            margin-bottom: 1rem;
            font-weight: 300;
            line-height: 1.6;
        }

        .project__tag{
            font-family: 'Courier New', monospace;
            color: rgba(245,240,232,0.4);
            font-size: 0.75rem;
            margin-bottom: 1rem;
        }

        .project__link{
            text-decoration: none;
            color: #c45c2e;
            font-size: 0.8rem;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            padding-bottom: 1px;
            transition: border-bottom 0.2s;
        }

        .project__link:hover{
            border-color: #c45c2e;
        }

        .empty_state{
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(245,240,232,0.3);
            padding: 4rem 2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Projects</h1>

            <div class="filter__bar" id="filter__bar">
                <button class="btn" data-category="all">All</button>
                <button class="btn" data-category="ux-design">Ux Design</button>
                <button class="btn" data-category="frontend">Frontend</button>
                <button class="btn" data-category="experimental">Experimental</button>
            </div>
        </header>
        

        <div class="card__container" id="card__container"></div>
    </div>

    <script>
        const filterBar = document.getElementById('filter__bar');
        const cardContainer = document.getElementById('card__container');
    
        const projects = [
            {
                title: 'Bloom — Habit Tracker',
                category: 'ux-design', 
                description: 'Redesigned onboarding experience.',
                tag: 'Mobile App · UX Design',
                link: 'View Case Study →'
            },
            {
                title: 'Pulse — Fitness Companion',
                category: 'frontend', 
                description: 'Built a React Native dashboard for real-time workout tracking.',
                tag: 'Mobile App · Frontend Dev',
                link: 'View Case Study →'
            },
            {
                title: 'Civicly — Local Issue Reporter',
                category: 'ux-design', 
                description: 'Designed and prototyped a platform for citizens to report civic issues.',
                tag: 'Web App · Product Design',
                link: 'View Case Study →'
            },
            {
                title: 'Loop — Async Collaboration Tool',
                category: 'frontend', 
                description: 'Developed a real-time comment system using WebSockets and Node.js.',
                tag: 'Web App · Fullstack Dev',
                link: 'View Case Study →'
            },
            {
                title: 'Muse — AI Moodboard Generator',
                category: 'experimental', 
                description: 'Experimented with prompt chaining to generate themed visual inspiration.',
                tag: 'Experimental AI · Prompt Engineering',
                link: 'View Case Study →'
            }
        ];

        function renderCards(filteredProjects) {
            cardContainer.innerHTML = '';

            if (filteredProjects.length === 0) {
            cardContainer.innerHTML = '<p class="empty__state">No projects in this category yet.</p>';
            return;
            }

            filteredProjects.forEach(function(project){
                // Card wrapper
                const card = document.createElement('div');
                card.className = 'project__card';

                card.innerHTML = `
                <div class="project__body">
                    <p class="project__category">${project.category}</p>
                    <h3 class="project__title">${project.title}</h3>
                    <p class="project__description">${project.description}</p>
                    <p class="project__tag">${project.tag}</p>
                    <a class="project__link" href="${project.link}">View Case Study →</a>
                </div>
                `;

                cardContainer.appendChild(card);
            })
        }
        

        function filteredProjects(category) {
            if(category === 'all'){
                renderCards(projects);
            } else {
                const filtered = projects.filter(function(project) {
                   return project.category === category; 
                }) 
                renderCards(filtered);
                
            }
        }

        filterBar.addEventListener('click', function (e) {
          if (!e.target.dataset.category) return;

            const category = e.target.dataset.category;
            
            setActiveBtn(e.target);

            filteredProjects(category);

        })
        
        function setActiveBtn(clickedBtn) {
            filterBar.querySelectorAll('.btn').forEach((btn) => {
                btn.classList.remove('active');
            })

            clickedBtn.classList.add('active');
        }

        renderCards(projects);

        const allBtn = filterBar.querySelector('[data-category="all"]');
        setActiveBtn(allBtn);
    </script>
</body>
</html>
