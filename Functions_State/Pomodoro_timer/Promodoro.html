<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promodoro Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::after, *::before{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:          #0d1117;
            --surface:     #161b22;
            --border:      rgba(255,255,255,0.08);
            --text:        #e6edf3;
            --muted:       #8b949e;
            --accent-work: #f78166;
            --accent-break:#79c0ff;
            --accent:      var(--accent-work); /* changes with mode */
            --speed:       0.4s;
        }

        body.break-mode{
            --accent: var(--accent-break);
        }

        body{
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: repeat(auto-fit ,minmax(340px, 1fr));
            align-content: center;
            gap: 0;
        }
        
        /* Left panel */
        .panel{
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 2.5rem;
            border-right: 1px solid var(--border);
            min-height: 100vh;
        }

        .panel__eyebrow{
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            transition: color var(--speed);
        }

        .panel__header{
            font-size: 3rem;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .panel__sub{
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Task input */
        .task__input{
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: var(--surface);
            border: 1px solid var(--border);
            outline: none;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 0.75rem;   
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .task__input:focus{border-color: var(--accent);}
        .task__input::placeholder{
            color: var(--muted);
        }

        /* Error message */
        .task__error{
            display: none;
            font-size: 0.8rem;
            color: #f78166;
            margin-bottom: 0.75rem;
        }

        .begin__btn{
            padding: 0.8rem 1.5rem;
            background-color: var(--accent);
            color: var(--bg);
            border-radius: 8px;
            outline: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, background-color var(--speed);
            align-self: flex-start;
        }

        .begin__btn:hover {opacity: 0.85;}

        /* Session history */
        .history__label{
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .history__list{
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .history__list li{
            font-size: 0.85rem;
            color: var(--muted);
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .history__list li span{
            font-size: 0.75rem;
            color: var(--accent);
            transition: color var(--speed);
        }

        /* Right panel */
        .timer__panel{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin: 3rem 2rem;
            min-height: 100vh;
        }

        .current__task{
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }

        .current__task strong{
            color: var(--text);
            font-weight: 500;
        }

        /* Mode pill */
        .mode__pill{
            padding: 0.4rem 1.25rem;
            border: 1px solid var(--accent);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            transition: color var(--speed), border-color var(--speed);
        }

        /* Timer circle */
        .timer__ring{
            position: relative;
            width: 220px;
            height: 220px;
        }

        .ring__svg{
            transform: rotate(-90deg);
            width: 220px;
            height: 220px;
        }

        .ring__track{
            fill: none;
            stroke: var(--border);
            stroke-width: 4;
        }

        .ring__progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 628;   /* circumference: 2π × 100 ≈ 628 */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke var(--speed);
        }

        .timer__face{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer__countdown{
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.4rem;
        }

        .timer__session{
            font-size: 0.75rem;
            color: var(--muted);
        }

        /* Button control */
        .btn__row{
            display: flex;
            gap: 0.75rem;
        }

        .ctrl__btn{
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, transform 0.15s;
        }

        .ctrl__btn:hover{
            background-color: #21262d;
            border-color: var(--muted);
        }
        .ctrl__btn:active{
            transform: scale(0.95);
        }

        /* start/pause */
        .ctrl__btn--primary{
            width: 64px;
            height: 62px;
            font-size: 1.3rem;
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            transition: opacity 0.2s, background var(--speed), border-color var(--speed);
        }

        .ctrl__btn--primary:hover{
            opacity: 0.85;
            background-color: var(--accent);
        }

        @media only screen and (max-width: 600px) {
            body {grid-template-columns: 1fr;}
            .panel {min-height: auto; border-right: none; border-bottom: 1px solid var(--border);}
            .timer__panel {min-height: auto; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Left panel -->
    <div class="panel">
        <p class="panel__eyebrow">Pomodoro Timer</p>
        <h1 class="panel__heading">What will you<br>focus on?</h1>
        <p class="panel__sub">Enter your task and start a 25-minute focused work session.</p>

        <input type="text" class="task__input" id="task__input" placeholder="e.g. Write the intro paragraph"
        maxlength="60"/>
        <p class="task__error" id="task__error">Please enter a task before starting.</p>
        <button class="begin__btn" id="begin__btn">Begin session</button>

        <p class="history__label">Completed sessions</p>
        <ul class="history__list" id="history__list">
            <li style="color: var(--muted); font-size: 0.82rem; border: none;">No sessions yet.</li>
        </ul>
    </div>

    <!-- Right panel -->
    <div class="timer__panel">

        <p class="current__task" id="current__task">No task set - enter one to begin.</p>

        <div class="mode__pill" id="mode__pill">Focus</div>

        <div class="timer__ring">
            <svg class="ring__svg" viewBox="0 0 220 220">
                <circle class="ring__track"    cx="110" cy="110" r="100"/>
                <circle class="ring__progress" cx="110" cy="110" r="100" id="ring__progress"/>
            </svg>
            <div class="timer__face">
               <div class="timer__countdown" id="countdown">25:00</div>
               <p class="timer__session" id="session__count">Session 1</p> 
            </div>
        </div>

        <div class="btn__row">
            <button class="ctrl__btn" id="reset__btn" title="Reset">⟳</button> 
            <button class="ctrl__btn ctrl__btn--primary" id="start__btn" title="Start">▶</button>
            <button class="ctrl__btn" id="mode__btn" title="Switch mode">⇄</button>
        </div>
    </div>
    
    <script>
        const taskInput = document.getElementById('task__input');
        const beginBtn = document.getElementById('begin__btn');
        const taskError = document.getElementById('task__error');
        const currentTask = document.getElementById('current__task');
        const modePill = document.getElementById('mode__pill');
        const countdown = document.getElementById('countdown');
        const sessionCount = document.getElementById('session__count');
        const ringProgress = document.getElementById('ring__progress');
        const startBtn = document.getElementById('start__btn');
        const resetBtn = document.getElementById('reset__btn');
        const modeBtn = document.getElementById('mode__btn');
        const historyList = document.getElementById('history__list');
 
        const WORK_DURATION = 25 * 60;
        const BREAK_DURATION = 5 * 60;
        const CIRCUMFERENCE = 628;


        let timeLeft   = WORK_DURATION; // 1500 seconds
        let isRunning  = false;
        let isWorkMode = true;
        let intervalId = null;
        let sessionNumber = 1;
        let currentTaskText = '';

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            countdown.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            const total = isWorkMode ? WORK_DURATION : BREAK_DURATION;
            const progress = timeLeft / total;
            ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
        }
        
        function tick() {
            timeLeft--;
            updateDisplay();

            if (timeLeft === 0) {
                clearInterval(intervalId);
                isRunning = false;
                
                if(isWorkMode){
                    addToHistory(currentTaskText, sessionNumber);
                    sessionNumber++;
                    sessionCount.textContent = `Session ${sessionNumber}`;
                }
                switchMode();
            }
        }

        function startPauseTimer() {
            if(isRunning){
                clearInterval(intervalId);
                isRunning = false;
                startBtn.textContent = '▶';
            } else {
                intervalId = setInterval(tick, 1000);
                isRunning = true;
                startBtn.textContent = '⏸';
            }
        }

        function resetTimer() {
            clearInterval(intervalId);
            isRunning = false;
            intervalId = null;
            isWorkMode = true;
            timeLeft = WORK_DURATION;

            startBtn.textContent = '▶';
            modePill.textContent = 'Focus';
            document.body.classList.remove('break-mode');

            updateDisplay();
        }

        function switchMode() {
            if (isRunning) {
                clearInterval(intervalId);
                isRunning = false;
            }

            isWorkMode = !isWorkMode;

            if(isWorkMode){
                timeLeft = WORK_DURATION;
                modePill.textContent = 'Focus';
                document.body.classList.remove('break-mode');
            } else {
                timeLeft = BREAK_DURATION;
                modePill.textContent = 'Break';
                document.body.classList.add('break-mode');
            }

            updateDisplay();
            startBtn.textContent = '▶';
            startPauseTimer();
        }

        function beginSession() {
            const taskValue = taskInput.value.trim();

            if(taskValue === ''){
                taskError.style.display = 'block';
                taskInput.focus();
                return;
            }
           
            taskError.style.display = 'none';
            currentTaskText = taskValue;

            currentTask.innerHTML = `Focused on : <strong>${taskValue}</strong>`;

            resetTimer();
            startPauseTimer();
        }

        function addToHistory(task, number) {
            const placeholder = historyList.querySelector('li');
            if(placeholder && !placeholder.dataset.session){
                historyList.innerHTML = '';
            }

            const li = document.createElement('li');
            li.dataset.session = number;
            li.innerHTML = `<span style="color: var(--text);">${task}</span>
            <span>Session ${number}</span>`;

            historyList.insertBefore(li, historyList.firstChild); 

        }

        beginBtn.addEventListener('click', beginSession);

        startBtn.addEventListener('click', startPauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        modeBtn.addEventListener('click', switchMode);

        taskInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') beginSession();
        });

        updateDisplay()
    </script>
</body>
</html>
